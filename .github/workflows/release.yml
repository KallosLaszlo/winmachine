name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend dependencies
        run: npm install
        working-directory: frontend

      - name: Build
        run: wails build

      - name: Upload unsigned exe for signing
        uses: actions/upload-artifact@v4
        id: upload-unsigned
        with:
          name: WinMachine-unsigned
          path: build/bin/WinMachine.exe

      - name: Sign executable (SignPath.io)
        uses: signpath/github-action-submit-signing-request@v1
        id: sign-process
        with:
          api-token: '${{ secrets.SIGNPATH_API_TOKEN }}'
          organization-id: '${{ secrets.SIGNPATH_ORGANIZATION_ID }}'
          project-slug: 'WinMachine'
          signing-policy-slug: 'release-signing'
          artifact-configuration-slug: 'exe'
          github-artifact-id: '${{ steps.upload-unsigned.outputs.artifact-id }}'
          wait-for-completion: true
          output-artifact-directory: 'signed-output'

      - name: Download signed artifact
        uses: actions/download-artifact@v4
        with:
          name: signed-artifact
          path: build/bin
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: WinMachine ${{ github.ref_name }}
          body: |
            ## WinMachine ${{ github.ref_name }}

            ### Download
            Download `WinMachine.exe` below — no installer needed, just run it.

            ### Changes
            See commit history for details.

            *This version is digitally signed.*
          files: build/bin/WinMachine.exe
          draft: false
          prerelease: false
          generate_release_notes: true
